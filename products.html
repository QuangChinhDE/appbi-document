<!DOCTYPE html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sản phẩm — AppBI</title>
<meta name="description" content="Toàn bộ module của AppBI, chia theo nhóm: Dữ liệu & Báo cáo (BI), Ứng dụng vận hành, Quản trị & Giám sát. Bấm vào một module để mở hướng dẫn chi tiết.">
<link rel="stylesheet" href="assets/styles.css?v=14"></head><body>

<section class="mhero"><div class="container">
  <a class="bk" href="index.html">← Tổng quan</a>
  <div style="margin-top:8px"><span class="ic">🧩</span></div>
  <h1>Sản phẩm</h1>
  <p>Toàn bộ module của AppBI, <b>chia theo nhóm</b> cho dễ theo dõi. Bấm vào một module để mở <b>hướng dẫn chi tiết</b> tương ứng.</p>
</div></section>

<section class="sec"><div class="container">
  <div id="prodgroups"></div>
</div></section>

<script src="assets/site.js?v=14"></script>
<script>
(function(){
  var wrap=document.getElementById('prodgroups');
  if(!wrap || !window.APPBI_MODULES || !window.APPBI_MODGROUPS) return;
  wrap.innerHTML = window.APPBI_MODGROUPS.map(function(g){
    var cards = window.APPBI_MODULES.filter(function(m){ return m.grp===g.key; }).map(function(m){
      var cta = g.key==='gov' ? 'Xem chi tiết →' : 'Xem hướng dẫn →';
      return '<a class="mcard" href="'+m.href+'">'+(m.badge?'<span class="badge">'+m.badge+'</span>':'')+
        '<div class="ic">'+m.ic+'</div><h3>'+m.n+'</h3><p>'+m.d+'</p><span class="go">'+cta+'</span></a>';
    }).join('');
    return '<div class="prodgrp">'+
      '<div class="prodgrp-head"><h2>'+g.name+'</h2><p>'+g.d+'</p></div>'+
      '<div class="mgrid">'+cards+'</div></div>';
  }).join('');
})();
</script>
</body></html>
